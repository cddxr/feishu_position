name: Amazon Rank Pipeline

on:
  workflow_dispatch:
  schedule:
    # UTC time. 23:00 UTC = 07:00 Asia/Shanghai (next day)
    - cron: "00 23 * * *"

jobs:
  run:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE }}
          SUPABASE_ON_CONFLICT: ${{ secrets.SUPABASE_ON_CONFLICT }}
          FEISHU_WEBHOOK_LYJ_GROUP: ${{ secrets.FEISHU_WEBHOOK_LYJ_GROUP }}
          FEISHU_WEBHOOK_YTX_GROUP: ${{ secrets.FEISHU_WEBHOOK_YTX_GROUP }}
          FEISHU_WEBHOOK_DEFAULT_GROUP: ${{ secrets.FEISHU_WEBHOOK_DEFAULT_GROUP }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
        run: python src/run_pipeline.py
